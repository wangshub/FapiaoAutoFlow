# 复制为 config.yaml 后填写。config.yaml 含密钥,已被 .gitignore 忽略,请勿提交。

imap:
  host: imap.163.com        # 163: imap.163.com  /  QQ: imap.qq.com
  port: 993
  user: your_account@163.com
  password: "你的客户端授权码"   # 注意:是 IMAP 授权码,不是邮箱登录密码
  folder: INBOX             # 监控的邮箱文件夹
  fetch_limit: 50           # 每次最多处理多少封未处理邮件
  # 只处理含这些主题关键词的邮件;留空表示不过滤(全部尝试识别)
  subject_keywords: []      # 例: ["发票", "fapiao", "invoice"]

ai:                         # OpenAI 兼容接口(通义千问 / 智谱等均兼容)
  api_key: "sk-xxxxxxxx"
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  model: qwen-plus          # 文本模型:PDF/OFD 有文字层、正文文本走它
  vision_model: ""          # 视觉模型:图片/无文字层走它;留空则复用 model
  temperature: 0.1
  max_tokens: 2048
  min_confidence: 0.6       # 低于此置信度判为「待处理」
  timeout: 60               # 单次调用超时(秒)
  max_retries: 3            # 失败重试次数

download:
  timeout: 20               # 下载正文/二维码链接的超时(秒)
  max_bytes: 20971520       # 单文件最大 20MB,超过判失败

paths:
  data_dir: data            # 所有运行数据根目录
  # 下面几项默认基于 data_dir,一般不用改
  db_file: data/fapiao.db
  archive_dir: data/archive   # 原始发票按 年/月 归档
  output_file: data/output/发票汇总.xlsx
